name: Installed package adoption

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  installed-package-adoption:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: installed-package adoption checks
            target: installed-package-adoption-only
          - label: installed-package adoption companion checks
            target: installed-package-adoption
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run ${{ matrix.label }}
        run: make ${{ matrix.target }}